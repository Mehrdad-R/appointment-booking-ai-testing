<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">Appointment Booking</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link" href="customer-dashboard.html">Overview</a>
                <a class="sidebar-link active" href="book-appointment.html">Book Appointment</a>
                <a class="sidebar-link" href="my-appointments.html">My Appointments</a>
            </nav>
        </aside>

        <div class="content-shell">
            <header class="topbar">
                <div>
                    <h1>Book Appointment</h1>
                    <p class="subtitle">Choose a service and reserve your preferred time</p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </header>

            <main class="content-area single-column-layout">
                <section class="panel">
                    <div class="panel-header">
                        <h2>Select a Service</h2>
                    </div>

                    <div class="service-card-grid" id="service-card-grid">
                        <button type="button" class="service-card active-service-card" data-service="Consultation">
                            <span class="service-icon">🗓️</span>
                            <strong>Consultation</strong>
                            <p>General appointment discussion and planning.</p>
                        </button>

                        <button type="button" class="service-card" data-service="Follow-up">
                            <span class="service-icon">🔄</span>
                            <strong>Follow-up</strong>
                            <p>Review progress and continue an existing appointment flow.</p>
                        </button>

                        <button type="button" class="service-card" data-service="Planning Session">
                            <span class="service-icon">📋</span>
                            <strong>Planning Session</strong>
                            <p>Structured meeting for scheduling and next-step planning.</p>
                        </button>

                        <button type="button" class="service-card" data-service="Priority Review">
                            <span class="service-icon">⚡</span>
                            <strong>Priority Review</strong>
                            <p>Reserved slot for higher-priority appointment needs.</p>
                        </button>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <h2>Booking Details</h2>
                    </div>

                    <form id="book-form" class="elevated-form">
                        <label for="title">Selected Service</label>
                        <input type="text" id="title" placeholder="Select a service above" required readonly>

                        <label for="start">Start Time</label>
                        <input type="datetime-local" id="start" required>

                        <label for="end">End Time</label>
                        <input type="datetime-local" id="end" required>

                        <button type="submit">Create Appointment</button>
                    </form>

                    <div id="book-message" class="message-box"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const session = requireAuth("customer");
        const bookForm = document.getElementById("book-form");
        const bookMessage = document.getElementById("book-message");
        const serviceCards = document.querySelectorAll(".service-card");
        const titleInput = document.getElementById("title");

        function selectService(serviceName, selectedCard) {
            titleInput.value = serviceName;
            serviceCards.forEach(card => card.classList.remove("active-service-card"));
            selectedCard.classList.add("active-service-card");
        }

        serviceCards.forEach(card => {
            card.addEventListener("click", () => {
                selectService(card.dataset.service, card);
            });
        });

        // default selected service
        titleInput.value = "Consultation";

        bookForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const payload = {
                title: document.getElementById("title").value.trim(),
                start: document.getElementById("start").value,
                end: document.getElementById("end").value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/my-appointments`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${session.token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    bookMessage.textContent = "Appointment created successfully.";
                    bookMessage.style.color = "green";
                    bookForm.reset();
                    titleInput.value = "Consultation";
                    serviceCards.forEach(card => card.classList.remove("active-service-card"));
                    serviceCards[0].classList.add("active-service-card");
                } else {
                    bookMessage.textContent = `Error: ${data.detail}`;
                    bookMessage.style.color = "red";
                }
            } catch (error) {
                bookMessage.textContent = "Error: Could not connect to backend.";
                bookMessage.style.color = "red";
            }
        });
    </script>
</body>
</html>
