<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">Appointment Booking</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link active" href="admin-dashboard.html">Overview</a>
                <a class="sidebar-link" href="agent-insights.html">Agent Insights</a>
            </nav>
        </aside>

        <div class="content-shell">
            <header class="topbar">
                <div>
                    <h1>Admin Dashboard</h1>
                    <p class="subtitle" id="admin-welcome">Welcome</p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </header>

            <main class="content-area single-column-layout">
                <section class="panel">
                    <div class="panel-header">
                        <h2>Overview</h2>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>System</h3>
                            <p>Administrative visibility</p>
                        </div>
                        <div class="stat-card">
                            <h3>AI</h3>
                            <p>Test planning insights</p>
                        </div>
                        <div class="stat-card">
                            <h3>History</h3>
                            <p>Runtime retrieval context</p>
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <h2>Admin Tools</h2>
                    </div>

                    <div class="action-buttons">
                        <a class="nav-btn" href="agent-insights.html">Open Agent Insights</a>
                        <button class="danger-action-btn" onclick="resetAppointments()">Reset Appointments</button>
                    </div>

                    <div id="admin-action-message" class="message-box"></div>
                </section>
            </main>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const session = requireAuth("admin");

        if (session) {
            document.getElementById("admin-welcome").textContent =
                `Welcome, ${session.user.username}`;
        }

        async function resetAppointments() {
            const confirmed = confirm(
                "This will clear all appointments. Continue?"
            );

            if (!confirmed) return;

            const messageBox = document.getElementById("admin-action-message");

            try {
                const response = await fetch(`${API_BASE_URL}/admin/reset-appointments`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = "Appointments reset successfully.";
                    messageBox.style.color = "green";
                } else {
                    messageBox.textContent = `Error: ${data.detail ?? "Could not reset appointments."}`;
                    messageBox.style.color = "red";
                }
            } catch (error) {
                messageBox.textContent = "Error: Could not connect to backend.";
                messageBox.style.color = "red";
            }
        }
    </script>
</body>
</html>
