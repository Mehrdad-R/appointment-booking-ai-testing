<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-brand">Appointment Booking</div>
            <nav class="sidebar-nav">
                <a class="sidebar-link" href="customer-dashboard.html">Overview</a>
                <a class="sidebar-link" href="book-appointment.html">Book Appointment</a>
                <a class="sidebar-link active" href="my-appointments.html">My Appointments</a>
            </nav>
        </aside>

        <div class="content-shell">
            <header class="topbar">
                <div>
                    <h1>My Appointments</h1>
                    <p class="subtitle">Review your booking activity and manage changes</p>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </header>

            <main class="content-area single-column-layout">
                <section class="panel">
                    <div class="panel-header">
                        <h2>Scheduled & Upcoming</h2>
                    </div>
                    <div id="scheduled-appointments">
                        <p class="empty-state">Loading appointments...</p>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <h2>Cancelled</h2>
                    </div>
                    <div id="cancelled-appointments">
                        <p class="empty-state">Loading appointments...</p>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const session = requireAuth("customer");
        let activeRescheduleId = null;

        function formatDateTime(dateTimeString) {
            return new Date(dateTimeString).toLocaleString();
        }

        function toDateTimeLocalValue(dateTimeString) {
            const date = new Date(dateTimeString);
            const offset = date.getTimezoneOffset();
            const localDate = new Date(date.getTime() - offset * 60000);
            return localDate.toISOString().slice(0, 16);
        }

        async function loadAppointments() {
            try {
                const response = await fetch(`${API_BASE_URL}/my-appointments`, {
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });

                const appointments = await response.json();

                if (!response.ok) {
                    document.getElementById("scheduled-appointments").innerHTML =
                        `<p class="empty-state">Could not load appointments.</p>`;
                    document.getElementById("cancelled-appointments").innerHTML =
                        `<p class="empty-state">Could not load appointments.</p>`;
                    return;
                }

                const scheduled = appointments.filter(a => a.status !== "cancelled");
                const cancelled = appointments.filter(a => a.status === "cancelled");

                renderAppointments("scheduled-appointments", scheduled, false);
                renderAppointments("cancelled-appointments", cancelled, true);
            } catch (error) {
                document.getElementById("scheduled-appointments").innerHTML =
                    `<p class="empty-state">Backend connection failed.</p>`;
                document.getElementById("cancelled-appointments").innerHTML =
                    `<p class="empty-state">Backend connection failed.</p>`;
            }
        }

        function renderAppointments(containerId, appointments, isCancelledSection) {
            const container = document.getElementById(containerId);

            if (appointments.length === 0) {
                container.innerHTML = `<p class="empty-state">No appointments found.</p>`;
                return;
            }

            container.innerHTML = appointments.map(appt => `
                <div class="appointment-card appointment-card-enhanced">
                    <div class="appointment-card-top">
                        <div>
                            <h3>${appt.title}</h3>
                            <p class="appointment-meta"><strong>Start:</strong> ${formatDateTime(appt.start)}</p>
                            <p class="appointment-meta"><strong>End:</strong> ${formatDateTime(appt.end)}</p>
                        </div>
                        <div>
                            <span class="status-badge">${appt.status}</span>
                        </div>
                    </div>

                    <div class="appointment-actions">
                        ${
                            !isCancelledSection
                                ? `
                                    <button class="cancel-btn" onclick="cancelAppointment('${appt.id}')">Cancel</button>
                                    <button class="reschedule-btn" onclick="openRescheduleForm('${appt.id}')">Reschedule</button>
                                  `
                                : `<span class="cancelled-label">Cancelled Appointment</span>`
                        }
                    </div>

                    ${
                        activeRescheduleId === appt.id && !isCancelledSection
                            ? `
                                <div class="reschedule-form">
                                    <h4>Reschedule Appointment</h4>

                                    <label>New Start Time</label>
                                    <input type="datetime-local" id="reschedule-start-${appt.id}" value="${toDateTimeLocalValue(appt.start)}">

                                    <label>New End Time</label>
                                    <input type="datetime-local" id="reschedule-end-${appt.id}" value="${toDateTimeLocalValue(appt.end)}">

                                    <div class="reschedule-actions">
                                        <button class="save-btn" onclick="submitReschedule('${appt.id}')">Save Reschedule</button>
                                        <button class="close-btn" onclick="closeRescheduleForm()">Close</button>
                                    </div>
                                </div>
                            `
                            : ""
                    }
                </div>
            `).join("");
        }

        async function cancelAppointment(appointmentId) {
            try {
                const response = await fetch(`${API_BASE_URL}/my-appointments/${appointmentId}/cancel`, {
                    method: "PATCH",
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(`Error: ${data.detail}`);
                    return;
                }

                activeRescheduleId = null;
                loadAppointments();
            } catch (error) {
                alert("Could not connect to backend.");
            }
        }

        function openRescheduleForm(appointmentId) {
            activeRescheduleId = appointmentId;
            loadAppointments();
        }

        function closeRescheduleForm() {
            activeRescheduleId = null;
            loadAppointments();
        }

        async function submitReschedule(appointmentId) {
            const payload = {
                start: document.getElementById(`reschedule-start-${appointmentId}`).value,
                end: document.getElementById(`reschedule-end-${appointmentId}`).value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/my-appointments/${appointmentId}/reschedule`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${session.token}`
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    alert(`Error: ${data.detail}`);
                    return;
                }

                activeRescheduleId = null;
                loadAppointments();
            } catch (error) {
                alert("Could not connect to backend.");
            }
        }

        loadAppointments();
    </script>
</body>
</html>
