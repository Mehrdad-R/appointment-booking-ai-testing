<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <header class="app-header">
            <h1>Appointment Booking System</h1>
            <p class="subtitle">Sprint 1 Dashboard</p>
        </header>

        <main class="dashboard">
            <section class="card form-card">
                <h2>Create Appointment</h2>
                <form id="appointment-form">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" placeholder="Enter appointment title" required>

                    <label for="start">Start Time</label>
                    <input type="datetime-local" id="start" name="start" required>

                    <label for="end">End Time</label>
                    <input type="datetime-local" id="end" name="end" required>

                    <button type="submit">Create Appointment</button>
                </form>

                <div id="message-box" class="message-box"></div>
            </section>

            <section class="card list-card">
                <h2>Appointments</h2>
                <div id="appointments-list">
                    <p class="empty-state">No appointments scheduled yet.</p>
                </div>

                <div class="danger-zone">
                    <button id="delete-all-btn" class="delete-all-btn">Delete All Appointments</button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
