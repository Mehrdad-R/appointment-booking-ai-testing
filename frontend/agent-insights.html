<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Insights</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <header class="app-header dashboard-header">
            <div>
                <h1>Agent Insights</h1>
                <p class="subtitle">Employee view of AI QA orchestration</p>
            </div>
            <div class="header-actions">
                <a class="nav-btn small-btn" href="employee-dashboard.html">Dashboard</a>
                <a class="nav-btn small-btn" href="manage-appointments.html">Manage Appointments</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <main class="dashboard single-column">
            <section class="card">
                <h2>Latest AI Test Plan</h2>
                <div id="plan-overview">
                    <p class="empty-state">Loading AI test plan...</p>
                </div>
            </section>

            <section class="card">
                <h2>Priority Tests</h2>
                <div id="priority-tests">
                    <p class="empty-state">Loading priority tests...</p>
                </div>
            </section>

            <section class="card">
                <h2>Agent Decision Summary</h2>
                <pre id="agent-summary" class="summary-box">Loading summary...</pre>
            </section>

            <section class="card">
                <h2>Runtime History</h2>
                <div id="runtime-history">
                    <p class="empty-state">Loading runtime history...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="auth.js"></script>
    <script>
        const session = requireAuth("employee");

        function renderPlan(plan) {
            if (!plan) {
                document.getElementById("plan-overview").innerHTML =
                    `<p class="empty-state">No AI test plan found yet.</p>`;
                document.getElementById("priority-tests").innerHTML =
                    `<p class="empty-state">No priority tests available.</p>`;
                return;
            }

            document.getElementById("plan-overview").innerHTML = `
                <div class="insight-grid">
                    <div class="insight-card">
                        <h3>Decision Source</h3>
                        <p>${plan.decision_source ?? "N/A"}</p>
                    </div>
                    <div class="insight-card">
                        <h3>Risk Level</h3>
                        <p>${plan.risk_level ?? "N/A"}</p>
                    </div>
                    <div class="insight-card">
                        <h3>Selected Groups</h3>
                        <p>${(plan.selected_groups ?? []).join(", ") || "None"}</p>
                    </div>
                </div>

                <div class="insight-detail">
                    <p><strong>Changed Files:</strong> ${(plan.changed_files ?? []).join(", ") || "None"}</p>
                    <p><strong>Reason:</strong> ${plan.reason ?? "No explanation available."}</p>
                </div>
            `;

            const priorityTests = plan.priority_tests ?? [];

            if (priorityTests.length === 0) {
                document.getElementById("priority-tests").innerHTML =
                    `<p class="empty-state">No priority tests listed.</p>`;
                return;
            }

            document.getElementById("priority-tests").innerHTML = `
                <ul class="feature-list">
                    ${priorityTests.map(test => `<li>${test}</li>`).join("")}
                </ul>
            `;
        }

        function renderSummary(summary) {
            const summaryBox = document.getElementById("agent-summary");
            summaryBox.textContent = summary || "No summary file found yet.";
        }

        function renderHistory(history) {
            if (!history) {
                document.getElementById("runtime-history").innerHTML =
                    `<p class="empty-state">No runtime history available yet.</p>`;
                return;
            }

            const recentFailures = history.recent_failures ?? [];
            const slowTests = history.slow_tests ?? [];
            const highRiskModules = history.high_risk_modules ?? [];

            document.getElementById("runtime-history").innerHTML = `
                <div class="history-section">
                    <h3>Recent Failures</h3>
                    ${
                        recentFailures.length
                            ? `<ul class="feature-list">
                                ${recentFailures.map(item => `<li><strong>${item.test_name}</strong>: ${item.failure_reason}</li>`).join("")}
                               </ul>`
                            : `<p class="empty-state">No recent failures recorded.</p>`
                    }
                </div>

                <div class="history-section">
                    <h3>Slow Tests</h3>
                    ${
                        slowTests.length
                            ? `<ul class="feature-list">
                                ${slowTests.map(item => `<li><strong>${item.test_name}</strong>: ${item.estimated_runtime}</li>`).join("")}
                               </ul>`
                            : `<p class="empty-state">No slow tests recorded.</p>`
                    }
                </div>

                <div class="history-section">
                    <h3>High-Risk Modules</h3>
                    ${
                        highRiskModules.length
                            ? `<ul class="feature-list">
                                ${highRiskModules.map(module => `<li>${module}</li>`).join("")}
                               </ul>`
                            : `<p class="empty-state">No high-risk modules recorded.</p>`
                    }
                </div>
            `;
        }

        async function loadInsights() {
            try {
                const response = await fetch(`${API_BASE_URL}/employee/agent/insights`, {
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    document.getElementById("plan-overview").innerHTML =
                        `<p class="empty-state">Could not load agent insights.</p>`;
                    document.getElementById("priority-tests").innerHTML =
                        `<p class="empty-state">Could not load priority tests.</p>`;
                    document.getElementById("agent-summary").textContent = "Could not load agent summary.";
                    document.getElementById("runtime-history").innerHTML =
                        `<p class="empty-state">Could not load runtime history.</p>`;
                    return;
                }

                renderPlan(data.plan);
                renderSummary(data.summary);
                renderHistory(data.history);

            } catch (error) {
                document.getElementById("plan-overview").innerHTML =
                    `<p class="empty-state">Backend connection failed.</p>`;
                document.getElementById("priority-tests").innerHTML =
                    `<p class="empty-state">Backend connection failed.</p>`;
                document.getElementById("agent-summary").textContent = "Backend connection failed.";
                document.getElementById("runtime-history").innerHTML =
                    `<p class="empty-state">Backend connection failed.</p>`;
            }
        }

        loadInsights();
    </script>
</body>
</html>
